<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reader Mockup 9 - Overlay Drawer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0A;
            --surface: #121212;
            --text: #F5F5F5;
            --muted: #737373;
            --border: #262626;
            --accent: #E53E3E;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Fraunces', serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        .mono { font-family: 'Courier Prime', monospace; }
        
        /* PDF Full Screen */
        .pdf-container {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            padding: 4rem 2rem;
            background-color: #0A0A0A;
        }
        
        .pdf-page {
            background-color: #E8E8E8;
            color: #111;
            width: 100%;
            max-width: 800px;
            height: 1200px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            padding: 4rem;
            font-family: sans-serif;
            border-radius: 4px;
        }

        /* Glass Notes Drawer */
        .notes-drawer {
            position: absolute;
            top: 0;
            right: 0;
            width: 45%;
            height: 100%;
            background-color: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255,255,255,0.1);
            padding: 4rem 3rem;
            display: flex;
            flex-direction: column;
            box-shadow: -20px 0 40px rgba(0,0,0,0.5);
            z-index: 40;
            transform: translateX(0); /* Can be toggled to 100% to hide */
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'Courier Prime', monospace;
            font-size: 1.1rem;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        /* Bottom Bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background-color: rgba(18, 18, 18, 0.9);
            backdrop-filter: blur(8px);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            z-index: 50;
        }

        .bar-section {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-family: 'Courier Prime', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.2s;
        }
        .control-btn:hover {
            color: var(--text);
        }
        .control-btn.active {
            color: var(--accent);
        }
        
        .bar-divider {
            width: 1px;
            height: 12px;
            background: var(--border);
        }

    </style>
</head>
<body>

    <div class="pdf-container">
        <div class="pdf-page">
            <h1 style="font-size: 2.5rem; margin-bottom: 1rem; text-align: center;">Attention Is All You Need</h1>
            <p style="text-align: center; color: #555; margin-bottom: 3rem;">Ashish Vaswani, Noam Shazeer...</p>
        </div>
    </div>

    <!-- Notes Drawer (Glassmorphism) -->
    <div class="notes-drawer">
        <textarea placeholder="Start typing your notes here..."># Attention Is All You Need

## Key Concepts
- Replaces RNNs/CNNs entirely with attention.
- **Self-attention**: relates different positions of a single sequence to compute a representation of the sequence.
- Highly parallelizable compared to RNNs.</textarea>
    </div>

    <!-- Global Bottom Bar -->
    <div class="bottom-bar mono">
        <div class="bar-section">
            <button class="control-btn">&larr; BACK</button>
            <div class="bar-divider"></div>
            <button class="control-btn">DARK MODE</button>
            <button class="control-btn active">HIGHLIGHT</button>
        </div>
        
        <div class="bar-section">
            <button class="control-btn">-</button>
            <span style="font-size: 0.75rem; color: var(--muted);">100%</span>
            <button class="control-btn">+</button>
            <div class="bar-divider"></div>
            <button class="control-btn">PAGE 1/15</button>
        </div>
        
        <div class="bar-section">
            <button class="control-btn active">TOGGLE NOTES (N)</button>
            <div class="bar-divider"></div>
            <span style="font-size: 0.75rem; color: var(--muted);">64 WORDS</span>
        </div>
    </div>

</body>
</html>
