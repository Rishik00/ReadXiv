<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/readxiv-logo-r-monogram.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReadXiv</title>
    <script>
      (function() {
        try {
          var s = localStorage.getItem('papyrus-settings');
          if (s) {
            var p = JSON.parse(s);
            if (p && p.theme) {
              var th =
                p.theme === 'default' || p.theme === 'aurora'
                  ? 'mist'
                  : p.theme === 'experimental'
                    ? 'periwinkle'
                    : p.theme;
              document.documentElement.setAttribute('data-theme', th);
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body style="background-color: #17181c">
    <div id="root"></div>
    <!-- MathJax is loaded on demand from Notes preview (see utils/mathjax.js) -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
